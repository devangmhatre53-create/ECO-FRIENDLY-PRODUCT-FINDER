<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Browse eco-friendly products. Filter by category, sort by rating or eco score." />
  <title>Products — Eco-Friendly Product Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M12 22c4-4 8-7.5 8-12a8 8 0 1 0-16 0c0 4.5 4 8 8 12z"/>
          <path d="M12 8v4M10 10h4"/>
        </svg>
        Eco Product Finder
      </a>
      <nav aria-label="Main navigation">
        <button type="button" class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-links" aria-label="Open menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <ul class="nav-links" id="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html" aria-current="page">Products</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="admin.html">Admin</a></li>
        </ul>
      </nav>
      <div class="nav-actions">
        <button type="button" class="btn-icon" id="theme-toggle" aria-label="Toggle dark or light mode">
          <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <h1 class="section-title">All Eco Products</h1>
      <p class="section-subtitle">Filter by category and sort by eco score or impact.</p>

      <div class="filters-bar">
        <div>
          <label for="products-search" class="visually-hidden">Search</label>
          <input type="search" id="products-search" placeholder="Search by name..." class="filter-search-input" />
        </div>
        <div>
          <label for="filter-category">Category</label>
          <select id="filter-category">
            <option value="">All categories</option>
          </select>
        </div>
        <div>
          <label for="sort-by">Sort by</label>
          <select id="sort-by">
            <option value="default">Default</option>
            <option value="ecoScore">Eco score (high first)</option>
            <option value="carbon">Carbon (low first)</option>
            <option value="price-asc">Price (low to high)</option>
            <option value="price-desc">Price (high to low)</option>
          </select>
        </div>
      </div>

      <div id="products-grid" class="product-grid"></div>
      <p id="products-empty" class="text-center mt-2" style="color: var(--text-muted); display: none;">No products match your filters.</p>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>Eco-Friendly Product Finder — Portfolio project.</p>
    </div>
  </footer>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="products.js"></script>
</body>
</html>
