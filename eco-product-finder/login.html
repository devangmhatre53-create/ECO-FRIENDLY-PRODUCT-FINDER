<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login or register for Eco-Friendly Product Finder." />
  <title>Login — Eco-Friendly Product Finder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="nav">
    <div class="container nav-inner">
      <a href="index.html" class="nav-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M12 22c4-4 8-7.5 8-12a8 8 0 1 0-16 0c0 4.5 4 8 8 12z"/>
          <path d="M12 8v4M10 10h4"/>
        </svg>
        Eco Product Finder
      </a>
      <nav aria-label="Main navigation">
        <button type="button" class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="nav-links" aria-label="Open menu">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <ul class="nav-links" id="nav-links">
          <li><a href="index.html">Home</a></li>
          <li><a href="products.html">Products</a></li>
          <li><a href="login.html" aria-current="page">Login</a></li>
          <li><a href="admin.html">Admin</a></li>
        </ul>
      </nav>
      <div class="nav-actions">
        <button type="button" class="btn-icon" id="theme-toggle" aria-label="Toggle dark or light mode">
          <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
          <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </div>
  </header>

  <main class="form-page">
    <div class="form-card">
      <h1>Welcome</h1>
      <div class="form-tabs" role="tablist">
        <button type="button" class="form-tab is-active" role="tab" aria-selected="true" id="tab-login" aria-controls="panel-login">Login</button>
        <button type="button" class="form-tab" role="tab" aria-selected="false" id="tab-register" aria-controls="panel-register">Register</button>
      </div>

      <div id="panel-login" class="form-panel is-active" role="tabpanel">
        <form id="login-form">
          <div class="form-group">
            <label for="login-email">Email</label>
            <input type="email" id="login-email" name="email" required placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" name="password" required placeholder="••••••••" autocomplete="current-password" />
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Login</button>
          </div>
        </form>
      </div>

      <div id="panel-register" class="form-panel" role="tabpanel" hidden>
        <form id="register-form">
          <div class="form-group">
            <label for="register-name">Name</label>
            <input type="text" id="register-name" name="name" required placeholder="Your name" autocomplete="name" />
          </div>
          <div class="form-group">
            <label for="register-email">Email</label>
            <input type="email" id="register-email" name="email" required placeholder="you@example.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label for="register-password">Password</label>
            <input type="password" id="register-password" name="password" required placeholder="••••••••" autocomplete="new-password" minlength="6" />
          </div>
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Create account</button>
          </div>
        </form>
      </div>

      <p class="form-toggle">
        <span id="toggle-hint">Don't have an account?</span>
        <a href="#" id="toggle-link">Register</a>
      </p>
    </div>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="login.js"></script>
</body>
</html>
